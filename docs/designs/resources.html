<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvela — Resources</title>
<link rel="stylesheet" href="shared.css">
<style>
  .resources-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  .resource-card {
    background: var(--white); border-radius: var(--radius-xl);
    border: 1px solid rgba(212,197,178,0.4); box-shadow: var(--shadow-sm);
    overflow: hidden; cursor: pointer; transition: all var(--transition);
  }
  .resource-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .resource-thumb {
    height: 140px; position: relative; overflow: hidden;
  }
  .resource-thumb .pattern {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  }
  .resource-pill {
    position: absolute; top: 12px; left: 12px;
    padding: 4px 12px; border-radius: 100px;
    font-size: 11.5px; font-weight: 600;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(4px);
    color: var(--foreground);
  }
  .resource-body { padding: 20px; }
  .resource-body h3 { font-size: 15px; font-weight: 600; line-height: 1.35; margin-bottom: 8px; }
  .resource-body p { font-size: 13.5px; opacity: 0.5; line-height: 1.45; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .resource-meta { font-size: 12px; opacity: 0.35; font-weight: 500; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(45,45,45,0.4);
    backdrop-filter: blur(4px); z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 250ms ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal-card {
    background: var(--white); border-radius: var(--radius-2xl);
    width: 680px; max-height: 80vh; overflow-y: auto;
    box-shadow: var(--shadow-xl); transform: translateY(16px);
    transition: transform 250ms ease;
  }
  .modal-overlay.open .modal-card { transform: translateY(0); }
  .modal-header {
    position: sticky; top: 0; background: var(--white);
    padding: 24px 28px 16px; border-bottom: 1px solid rgba(212,197,178,0.2);
    display: flex; align-items: flex-start; justify-content: space-between;
    z-index: 1;
  }
  .modal-header h2 { font-size: 20px; font-weight: 600; line-height: 1.35; flex: 1; padding-right: 16px; }
  .modal-close {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: rgba(212,197,178,0.2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition); flex-shrink: 0;
    color: var(--foreground);
  }
  .modal-close:hover { background: rgba(212,197,178,0.4); }
  .modal-meta {
    padding: 0 28px; margin-top: 12px;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; opacity: 0.45;
  }
  .modal-body { padding: 24px 28px 32px; font-size: 15px; line-height: 1.7; color: var(--foreground); }
  .modal-body p { margin-bottom: 16px; }
  .modal-body h3 { font-size: 17px; font-weight: 600; margin: 24px 0 12px; }
  .modal-body ul { padding-left: 20px; margin-bottom: 16px; }
  .modal-body ul li { margin-bottom: 6px; }
</style>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="main"></main>
</div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()"></div>
<div class="demo-toggle" id="demoToggle"></div>
<script src="shared.js"></script>
<script>
const seed = getCurrentSeed();
const state = getOrSeedState(seed);

const RESOURCES = [
  { id: 1, category: "Getting Started", title: "Your first week on GLP-1: what to expect", preview: "A simple guide to your first few days of treatment, common experiences, and tips for success.", time: "4 min read",
    color: "linear-gradient(135deg, rgba(124,154,130,0.15), rgba(124,154,130,0.05))",
    shapes: `<svg viewBox="0 0 200 140" width="200" height="140"><circle cx="60" cy="70" r="40" fill="rgba(124,154,130,0.12)"/><circle cx="140" cy="60" r="24" fill="rgba(124,154,130,0.08)"/><rect x="80" y="90" width="60" height="6" rx="3" fill="rgba(124,154,130,0.15)"/></svg>`,
    body: `<p>Starting GLP-1 medication is a significant step in your wellness journey. Here is what you can expect during your first week.</p><h3>Day 1-2: Your First Injection</h3><p>Your medication kit arrives with clear instructions. Most patients administer their first injection in the morning. You may feel a slight pinch at the injection site, similar to a small mosquito bite. This is completely normal.</p><h3>Day 3-4: Adjusting</h3><p>Many patients begin noticing reduced appetite within the first few days. Some experience mild nausea, which typically subsides as your body adjusts. Stay hydrated and eat smaller, more frequent meals.</p><h3>Day 5-7: Finding Your Rhythm</h3><p>By the end of the first week, most patients have established a comfortable routine. You may notice you feel fuller faster during meals and have fewer cravings between them.</p><ul><li>Take your injection at the same time each week</li><li>Rotate injection sites between your abdomen, thigh, and upper arm</li><li>Keep a log of how you feel each day</li><li>Reach out to your care team with any questions</li></ul>`
  },
  { id: 2, category: "Side Effects", title: "Managing common side effects", preview: "Nausea, fatigue, and appetite changes are common early on. Here is how to manage them effectively.", time: "5 min read",
    color: "linear-gradient(135deg, rgba(224,122,95,0.12), rgba(224,122,95,0.04))",
    shapes: `<svg viewBox="0 0 200 140" width="200" height="140"><rect x="40" y="30" width="50" height="50" rx="12" fill="rgba(224,122,95,0.1)" transform="rotate(15 65 55)"/><circle cx="140" cy="80" r="30" fill="rgba(224,122,95,0.08)"/><rect x="60" y="100" width="80" height="5" rx="2.5" fill="rgba(224,122,95,0.12)"/></svg>`,
    body: `<p>Side effects are a normal part of starting GLP-1 therapy. Understanding them helps you stay on track.</p><h3>Nausea</h3><p>The most commonly reported side effect. It usually peaks in the first 1-2 weeks and diminishes as your body adjusts. Eating bland foods, staying hydrated, and avoiding large meals can help significantly.</p><h3>Appetite Changes</h3><p>Reduced appetite is actually the medication working as intended. However, it is important to still maintain adequate nutrition. Focus on protein-rich foods and vegetables even if portions are smaller.</p><h3>When to Contact Your Provider</h3><p>Reach out to your care team if you experience persistent vomiting, severe abdominal pain, or any symptoms that concern you. Your provider can adjust your dose or recommend strategies to help.</p>`
  },
  { id: 3, category: "Nutrition", title: "Eating well on GLP-1 therapy", preview: "Your appetite will change. Here is how to make sure you are getting the nutrients your body needs.", time: "6 min read",
    color: "linear-gradient(135deg, rgba(212,197,178,0.2), rgba(212,197,178,0.05))",
    shapes: `<svg viewBox="0 0 200 140" width="200" height="140"><circle cx="70" cy="60" r="35" fill="rgba(212,197,178,0.2)"/><circle cx="130" cy="80" r="20" fill="rgba(212,197,178,0.15)"/><rect x="50" y="105" width="100" height="5" rx="2.5" fill="rgba(212,197,178,0.25)"/></svg>`,
    body: `<p>As your appetite decreases, making every bite count becomes more important. Here are evidence-based nutrition strategies for patients on GLP-1 medications.</p><h3>Prioritize Protein</h3><p>Aim for 25-30 grams of protein per meal. This helps preserve lean muscle mass during weight loss and keeps you feeling satisfied longer.</p><h3>Stay Hydrated</h3><p>Drink at least 64 ounces of water daily. Proper hydration supports metabolism and can help reduce nausea. Consider adding electrolytes if you are eating significantly less.</p><h3>Sample Meal Ideas</h3><ul><li>Greek yogurt with berries and nuts</li><li>Grilled chicken with roasted vegetables</li><li>Salmon with quinoa and steamed greens</li><li>Cottage cheese with sliced fruit</li></ul>`
  },
  { id: 4, category: "Mindset", title: "Building sustainable habits beyond medication", preview: "Medication is a tool, not a finish line. How to build the behaviors that last.", time: "4 min read",
    color: "linear-gradient(135deg, rgba(124,154,130,0.1), rgba(212,197,178,0.1))",
    shapes: `<svg viewBox="0 0 200 140" width="200" height="140"><rect x="30" y="40" width="40" height="40" rx="20" fill="rgba(124,154,130,0.1)"/><rect x="90" y="50" width="30" height="30" rx="15" fill="rgba(212,197,178,0.2)"/><rect x="140" y="35" width="35" height="35" rx="17.5" fill="rgba(124,154,130,0.08)"/><rect x="40" y="100" width="120" height="5" rx="2.5" fill="rgba(212,197,178,0.2)"/></svg>`,
    body: `<p>GLP-1 medication gives you a powerful head start, but the habits you build alongside it determine your long-term success.</p><h3>Start Small</h3><p>Focus on one new habit at a time. Whether it is a daily walk, meal prepping on Sundays, or drinking more water, small consistent changes compound over time.</p><h3>Track Your Wins</h3><p>Weight is just one metric. Notice improvements in energy, sleep, mood, and how your clothes fit. These non-scale victories often matter more for long-term motivation.</p><h3>Plan for Plateaus</h3><p>Every weight loss journey includes plateaus. They are a normal physiological response, not a sign of failure. Your care team can help you navigate these moments.</p>`
  },
  { id: 5, category: "Plateaus", title: "Why weight loss plateaus happen (and what to do)", preview: "Hit a stall? That is normal. Understanding the science behind plateaus can help you push through.", time: "5 min read",
    color: "linear-gradient(135deg, rgba(139,164,196,0.12), rgba(139,164,196,0.04))",
    shapes: `<svg viewBox="0 0 200 140" width="200" height="140"><polyline points="20,100 60,80 100,82 140,60 180,40" fill="none" stroke="rgba(139,164,196,0.3)" stroke-width="3" stroke-linecap="round"/><circle cx="100" cy="82" r="6" fill="rgba(139,164,196,0.2)"/><rect x="60" y="110" width="80" height="5" rx="2.5" fill="rgba(139,164,196,0.15)"/></svg>`,
    body: `<p>You have been making great progress, and then the scale stops moving. Sound familiar? Weight loss plateaus are one of the most common and frustrating experiences, but they are completely normal.</p><h3>The Science</h3><p>As you lose weight, your body adapts by lowering its metabolic rate. This is an evolutionary survival mechanism. Your body is trying to maintain equilibrium, not sabotage your efforts.</p><h3>What You Can Do</h3><ul><li>Review your protein intake and make sure it is adequate</li><li>Consider adding or varying your physical activity</li><li>Ensure you are getting 7-9 hours of quality sleep</li><li>Talk to your provider about a dose adjustment</li></ul><p>Most plateaus resolve within 2-4 weeks. Stay consistent with your habits and trust the process.</p>`
  },
  { id: 6, category: "Community", title: "You are not alone: stories from the Nuvela community", preview: "Real perspectives from people navigating the same journey. Connection makes the difference.", time: "3 min read",
    color: "linear-gradient(135deg, rgba(224,122,95,0.08), rgba(124,154,130,0.08))",
    shapes: `<svg viewBox="0 0 200 140" width="200" height="140"><circle cx="60" cy="60" r="20" fill="rgba(224,122,95,0.1)"/><circle cx="100" cy="70" r="25" fill="rgba(124,154,130,0.1)"/><circle cx="145" cy="55" r="18" fill="rgba(212,197,178,0.2)"/><rect x="40" y="105" width="120" height="5" rx="2.5" fill="rgba(212,197,178,0.15)"/></svg>`,
    body: `<p>Weight loss can feel isolating, but thousands of people are on this same path. While we cannot share individual stories without permission, here is what we hear most often from our community.</p><h3>Common Themes</h3><ul><li>Relief at finally having medical support for weight management</li><li>Surprise at how quickly appetite changes take effect</li><li>Gratitude for having a provider who listens and adjusts</li><li>Pride in non-scale victories like improved energy and confidence</li></ul><p>Your care team is here for the tough days and the wins. Do not hesitate to reach out anytime.</p>`
  }
];

function sb(a,s){const u=getUnreadCount(s),lk=[
{id:'dashboard',label:'Dashboard',icon:'dashboard',href:'dashboard.html'},
{id:'messages',label:'Messages',icon:'messages',href:'messages.html',badge:u},
{id:'orders',label:'Orders',icon:'orders',href:'orders.html'},
{id:'progress',label:'Progress',icon:'progress',href:'progress.html'},
{id:'resources',label:'Resources',icon:'resources',href:'resources.html'}];
document.getElementById('sidebar').innerHTML=`<a class="sidebar-logo" href="dashboard.html"><span class="logo-dot"></span>Nuvela</a><div class="sidebar-nav">${lk.map(l=>`<a class="sidebar-link ${a===l.id?'active':''}" href="${l.href}"><svg viewBox="0 0 24 24">${ICONS[l.icon]}</svg>${l.label}${l.badge?'<span class="sidebar-badge">'+l.badge+'</span>':''}</a>`).join('')}</div><div class="sidebar-user"><div class="sidebar-avatar">${s.user.firstName[0]}${s.user.lastName[0]}</div><div class="sidebar-user-info"><div class="sidebar-user-name">${s.user.firstName} ${s.user.lastName}</div><div class="sidebar-user-plan">${s.plan.name} Plan</div></div></div>`;}

function render() {
  let html = `
    <div class="page-header animate-in stagger-1">
      <div class="page-greeting">Resources</div>
      <div class="page-subtitle">Learn more about your treatment journey</div>
    </div>
    <div class="resources-grid">
      ${RESOURCES.map((r, i) => `
        <div class="resource-card animate-in stagger-${Math.min(i+2, 6)}" onclick="openArticle(${r.id})">
          <div class="resource-thumb">
            <div class="pattern" style="background:${r.color}">${r.shapes}</div>
            <span class="resource-pill">${r.category}</span>
          </div>
          <div class="resource-body">
            <h3>${r.title}</h3>
            <p>${r.preview}</p>
            <div class="resource-meta">${r.time}</div>
          </div>
        </div>
      `).join('')}
    </div>`;
  document.getElementById('main').innerHTML = html;
}

function openArticle(id) {
  const r = RESOURCES.find(x => x.id === id);
  if (!r) return;
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-header">
        <h2>${r.title}</h2>
        <button class="modal-close" onclick="closeModal()">${icon('x', 18)}</button>
      </div>
      <div class="modal-meta">
        <span class="resource-pill" style="position:static">${r.category}</span>
        <span>${r.time}</span>
      </div>
      <div class="modal-body">${r.body}</div>
    </div>`;
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

sb('resources', state);
render();
document.getElementById('demoToggle').innerHTML=`
  <button class="${seed==='newUser'?'active':''}" onclick="setCurrentSeed('newUser');location.reload()">New User</button>
  <button class="${seed==='week4'?'active':''}" onclick="setCurrentSeed('week4');location.reload()">Week 4</button>`;
</script>
</body>
</html>
