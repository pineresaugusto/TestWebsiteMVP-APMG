<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, system-ui, sans-serif">
  <!-- Iter 7 / Scope 2: illustrative OG alternative.
       Compare against the existing /public/images/home-bedroom.jpg
       photographic OG. This editorial card uses the same brand
       palette (sage, warm coral, cream) and the Fraunces-style
       display serif via web fonts in production. No human imagery,
       which removes the "models shown" caveat from social previews
       and reads more on-brand as a wordmark/proof-driven card. -->

  <!-- Cream base -->
  <rect width="1200" height="630" fill="#FAF8F5"/>

  <!-- Sage glow, top-right -->
  <defs>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#7C9A82" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7C9A82" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx="10%" cy="100%" r="45%">
      <stop offset="0%" stop-color="#E07A5F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E07A5F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#7C9A82" fill-opacity="0.30"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#coralGlow)"/>

  <!-- Decorative dotted tile, back layer -->
  <rect x="940" y="80" width="170" height="170" rx="28" fill="url(#dots)"/>

  <!-- Wordmark dot + name -->
  <circle cx="92" cy="86" r="7" fill="#7C9A82"/>
  <text x="112" y="94" font-size="28" font-weight="600" fill="#2D2D2D" letter-spacing="-0.01em">Nuvela</text>

  <!-- Kicker rule + label -->
  <line x1="92" y1="240" x2="142" y2="240" stroke="#5A7561" stroke-width="2"/>
  <text x="155" y="246" font-size="16" font-weight="600" fill="#5A7561" letter-spacing="0.2em">GLP-1 TREATMENT FROM HOME</text>

  <!-- Headline (display serif in production; system serif fallback here) -->
  <text x="92" y="332" font-family="'Fraunces', 'Georgia', serif" font-size="84" font-weight="500" fill="#2D2D2D" letter-spacing="-0.015em">A provider, a plan,</text>
  <text x="92" y="416" font-family="'Fraunces', 'Georgia', serif" font-size="84" font-weight="500" fill="#2D2D2D" letter-spacing="-0.015em">and</text>
  <text x="232" y="416" font-family="'Fraunces', 'Georgia', serif" font-size="84" font-style="italic" font-weight="400" fill="#5A7561" letter-spacing="-0.015em">nothing in the way</text>
  <text x="843" y="416" font-family="'Fraunces', 'Georgia', serif" font-size="84" font-weight="500" fill="#2D2D2D">.</text>

  <!-- Trust strip -->
  <g transform="translate(92, 510)" font-size="18" fill="#2D2D2D" fill-opacity="0.65">
    <!-- Check 1 -->
    <g>
      <circle cx="10" cy="10" r="10" fill="#7C9A82" fill-opacity="0.18"/>
      <path d="M5 10.5 l4 4 l7 -8" stroke="#5A7561" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="16">Licensed providers</text>
    </g>
    <g transform="translate(260, 0)">
      <circle cx="10" cy="10" r="10" fill="#7C9A82" fill-opacity="0.18"/>
      <path d="M5 10.5 l4 4 l7 -8" stroke="#5A7561" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="16">No insurance needed</text>
    </g>
    <g transform="translate(540, 0)">
      <circle cx="10" cy="10" r="10" fill="#7C9A82" fill-opacity="0.18"/>
      <path d="M5 10.5 l4 4 l7 -8" stroke="#5A7561" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="16">Cancel anytime</text>
    </g>
  </g>

  <!-- Coral accent pill (echoes home page floating pill) -->
  <g transform="translate(950, 470)">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="#FFFFFF" stroke="#7C9A82" stroke-opacity="0.35"/>
    <text x="20" y="29" font-size="12" font-weight="600" fill="#5A7561" letter-spacing="0.18em">FROM $199 / MONTH</text>
  </g>
</svg>
