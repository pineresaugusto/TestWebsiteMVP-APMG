<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvela — Choose Your Plan</title>
<link rel="stylesheet" href="shared.css">
<style>
  .plan-page { max-width: 1080px; margin: 0 auto; padding: 48px 32px 64px; }
  .plan-page h1 {
    font-family: 'Fraunces', Georgia, serif; font-size: 32px;
    font-weight: 500; text-align: center; letter-spacing: -0.02em;
  }
  .plan-page .subtitle {
    text-align: center; font-size: 15.5px; opacity: 0.55;
    margin-top: 8px; margin-bottom: 40px; line-height: 1.5; max-width: 520px; margin-left: auto; margin-right: auto;
  }
  .plan-page .subtitle strong { color: var(--primary-dark); font-weight: 600; }

  .plans-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }

  .plan-card {
    background: var(--white); border-radius: var(--radius-xl);
    border: 2px solid rgba(212,197,178,0.4); box-shadow: var(--shadow-sm);
    padding: 28px 24px; cursor: pointer; transition: all var(--transition);
    position: relative; display: flex; flex-direction: column;
  }
  .plan-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .plan-card.selected {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,154,130,0.15), var(--shadow-md);
  }
  .plan-card .recommended {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%) translateY(-50%);
    background: var(--accent); color: white; font-size: 11.5px; font-weight: 700;
    padding: 4px 16px; border-radius: 100px; white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.04em;
  }

  .plan-radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--secondary); background: var(--white);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition); margin-bottom: 16px;
  }
  .plan-card.selected .plan-radio {
    border-color: var(--primary); background: var(--primary);
  }
  .plan-card.selected .plan-radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%; background: white;
  }

  .plan-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .plan-tagline { font-size: 13.5px; opacity: 0.5; margin-bottom: 16px; }
  .plan-price {
    font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums;
    line-height: 1; margin-bottom: 4px;
  }
  .plan-price span { font-size: 15px; font-weight: 500; opacity: 0.45; }
  .plan-dose { font-size: 13px; opacity: 0.45; margin-bottom: 20px; }

  .plan-features { list-style: none; flex: 1; }
  .plan-features li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13.5px; line-height: 1.4; padding: 6px 0;
    color: var(--foreground);
  }
  .plan-features li svg { width: 16px; height: 16px; color: var(--primary); flex-shrink: 0; margin-top: 2px; }

  /* Summary bar */
  .plan-summary {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--white); border-radius: var(--radius-xl);
    border: 1px solid rgba(212,197,178,0.4); box-shadow: var(--shadow-sm);
    padding: 20px 28px;
  }
  .plan-summary .selected-text { font-size: 15px; font-weight: 600; }
  .plan-summary .selected-text span { color: var(--primary-dark); }
  .plan-summary .btn { min-width: 220px; }

  .plan-fine-print {
    text-align: center; font-size: 13px; opacity: 0.35;
    margin-top: 20px; line-height: 1.5;
  }
  .plan-fine-print a { color: var(--primary-dark); text-decoration: none; }
</style>
</head>
<body>
<div class="funnel-header">
  <a class="logo" href="dashboard.html"><span class="logo-dot"></span>Nuvela</a>
  <span class="step-indicator">Step 2 of 4</span>
  <button class="funnel-signout" onclick="window.location.href='signup.html'">Sign out</button>
</div>

<div class="plan-page">
  <h1 class="animate-in stagger-1">Choose your plan</h1>
  <p class="subtitle animate-in stagger-1" id="planSubtitle"></p>

  <div class="plans-grid" id="plansGrid"></div>

  <div class="plan-summary animate-in stagger-5" id="planSummary"></div>
  <div class="plan-fine-print animate-in stagger-6">
    Pricing shown is illustrative. Cancel anytime. No insurance required.
    <a href="#">Medical disclaimer</a>
  </div>
</div>

<script src="shared.js"></script>
<script>
const PLANS = [
  {
    name: "Start", price: 199, tagline: "Begin your journey",
    dose: "Semaglutide 0.25mg", features: [
      "Licensed provider consultation",
      "Monthly medication supply",
      "Injection supplies included",
      "Messaging with care team",
      "Getting started resources",
      "Cancel anytime"
    ]
  },
  {
    name: "Accelerate", price: 299, tagline: "Steady, sustained progress",
    dose: "Semaglutide 0.25mg - 1.0mg", recommended: true, features: [
      "Everything in Start",
      "Dose escalation protocol",
      "Priority provider messaging",
      "Weekly check-ins",
      "Nutrition guidance",
      "Weight tracking tools",
      "Cancel anytime"
    ]
  },
  {
    name: "Transform", price: 399, tagline: "Comprehensive support",
    dose: "Semaglutide 0.25mg - 2.4mg", features: [
      "Everything in Accelerate",
      "Full dose range access",
      "Dedicated care coordinator",
      "Bi-weekly video check-ins",
      "Behavioral coaching sessions",
      "Personalized meal plans",
      "Priority pharmacy fulfillment",
      "Cancel anytime"
    ]
  }
];

const params = new URLSearchParams(window.location.search);
const fromQuiz = params.get('skipped') !== 'signup' && params.get('skipped') !== 'quiz';
let selected = fromQuiz ? 'Accelerate' : null;

function renderSubtitle() {
  const el = document.getElementById('planSubtitle');
  if (fromQuiz) {
    el.innerHTML = 'Based on your answers, we recommend <strong>Accelerate</strong>. You can change this anytime.';
  } else {
    el.textContent = 'Not sure? Take the assessment anytime for a personalized recommendation.';
  }
}

function renderPlans() {
  document.getElementById('plansGrid').innerHTML = PLANS.map((p, i) => `
    <div class="plan-card ${selected === p.name ? 'selected' : ''} animate-in stagger-${i+2}" onclick="selectPlan('${p.name}')">
      ${p.recommended && fromQuiz ? '<div class="recommended">Recommended for you</div>' : ''}
      <div class="plan-radio"></div>
      <div class="plan-name">${p.name}</div>
      <div class="plan-tagline">${p.tagline}</div>
      <div class="plan-price">$${p.price}<span>/mo</span></div>
      <div class="plan-dose">${p.dose}</div>
      <ul class="plan-features">
        ${p.features.map(f => `<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${ICONS.check}</svg>${f}</li>`).join('')}
      </ul>
    </div>
  `).join('');
  renderSummary();
}

function selectPlan(name) {
  selected = name;
  renderPlans();
}

function renderSummary() {
  const plan = PLANS.find(p => p.name === selected);
  document.getElementById('planSummary').innerHTML = plan
    ? `<div class="selected-text">Selected: <span>${plan.name} &mdash; $${plan.price}/mo</span></div>
       <button class="btn btn-primary btn-lg" onclick="continueToPay()">Continue to checkout</button>`
    : `<div class="selected-text" style="opacity:0.45">Select a plan to continue</div>
       <button class="btn btn-primary btn-lg" disabled>Continue to checkout</button>`;
}

function continueToPay() {
  if (!selected) return;
  const plan = PLANS.find(p => p.name === selected);
  let state = getState() || {};
  state.plan = { name: plan.name, price: plan.price, tagline: plan.tagline };
  setState(state);
  window.location.href = 'checkout.html';
}

renderSubtitle();
renderPlans();
</script>
</body>
</html>
