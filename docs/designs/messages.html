<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvela — Messages</title>
<link rel="stylesheet" href="shared.css">
<style>
  .messages-layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 72px);
    gap: 0;
    background: var(--white);
    border-radius: var(--radius-xl);
    border: 1px solid rgba(212,197,178,0.4);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  /* Thread list */
  .thread-list {
    border-right: 1px solid rgba(212,197,178,0.4);
    display: flex;
    flex-direction: column;
    background: rgba(250,248,245,0.5);
  }
  .thread-list-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(212,197,178,0.3);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .thread-list-header h2 {
    font-size: 16px;
    font-weight: 700;
  }
  .thread-filter {
    display: flex;
    gap: 4px;
    padding: 0 16px 12px;
    border-bottom: 1px solid rgba(212,197,178,0.2);
  }
  .thread-filter button {
    padding: 5px 14px;
    border-radius: 100px;
    border: none;
    font-size: 12.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all var(--transition);
    background: transparent;
    color: var(--foreground);
    opacity: 0.5;
  }
  .thread-filter button.active {
    background: var(--foreground);
    color: var(--white);
    opacity: 1;
  }
  .thread-items {
    flex: 1;
    overflow-y: auto;
  }
  .thread-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    transition: background var(--transition);
    border-bottom: 1px solid rgba(212,197,178,0.15);
    position: relative;
  }
  .thread-item:hover { background: rgba(212,197,178,0.12); }
  .thread-item.active { background: var(--white); }
  .thread-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .thread-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .thread-avatar.support { background: var(--secondary); color: var(--foreground); }
  .thread-info { flex: 1; min-width: 0; }
  .thread-top { display: flex; align-items: center; gap: 8px; }
  .thread-sender { font-size: 14px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread-time { font-size: 12px; opacity: 0.4; flex-shrink: 0; }
  .thread-role { font-size: 12px; opacity: 0.4; margin-top: 1px; }
  .thread-preview { font-size: 13px; opacity: 0.55; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread-unread-indicator { display: flex; align-items: center; gap: 4px; }

  /* Thread view */
  .thread-view {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .thread-view-header {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(212,197,178,0.3);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .thread-view-header .name { font-size: 15px; font-weight: 600; }
  .thread-view-header .role { font-size: 13px; opacity: 0.45; }
  .response-time {
    margin-left: auto;
    font-size: 12px;
    color: var(--primary-dark);
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .response-time svg { width: 14px; height: 14px; }

  .messages-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg-date-divider {
    text-align: center;
    font-size: 12px;
    opacity: 0.4;
    font-weight: 500;
    padding: 8px 0;
  }
  .msg-bubble-row {
    display: flex;
    gap: 8px;
    max-width: 75%;
  }
  .msg-bubble-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-bubble-row.provider { align-self: flex-start; }
  .msg-bubble-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .msg-bubble-row.provider .msg-bubble-avatar {
    background: var(--primary);
    color: white;
  }
  .msg-bubble-row.user .msg-bubble-avatar {
    background: var(--secondary);
    color: var(--foreground);
  }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg-bubble-row.provider .msg-bubble {
    background: rgba(212,197,178,0.2);
    color: var(--foreground);
    border-bottom-left-radius: 4px;
  }
  .msg-bubble-row.user .msg-bubble {
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-bubble-time {
    font-size: 11px;
    opacity: 0.4;
    margin-top: 4px;
    padding: 0 8px;
  }
  .msg-bubble-row.user .msg-bubble-time { text-align: right; }

  .message-input-area {
    padding: 16px 24px;
    border-top: 1px solid rgba(212,197,178,0.3);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .message-textarea {
    flex: 1;
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--secondary);
    background: rgba(250,248,245,0.6);
    font-size: 14px;
    font-family: inherit;
    color: var(--foreground);
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color var(--transition);
    line-height: 1.4;
  }
  .message-textarea:focus { border-color: var(--primary); }
  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--primary-dark); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  /* Empty state */
  .thread-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0.4;
  }
  .thread-empty svg { width: 48px; height: 48px; margin-bottom: 16px; }
  .thread-empty p { font-size: 15px; font-weight: 500; }

  /* Empty inbox */
  .inbox-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    text-align: center;
  }
  .inbox-empty-shapes {
    width: 100px;
    height: 100px;
    position: relative;
    margin-bottom: 20px;
  }
  .inbox-empty-shapes .circle1 {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(124,154,130,0.12);
    position: absolute; top: 0; left: 20px;
  }
  .inbox-empty-shapes .circle2 {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(224,122,95,0.1);
    position: absolute; bottom: 0; right: 10px;
  }
  .inbox-empty-shapes .rect {
    width: 50px; height: 6px; border-radius: 3px;
    background: rgba(212,197,178,0.4);
    position: absolute; bottom: 20px; left: 0;
  }
  .inbox-empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .inbox-empty p { font-size: 14px; opacity: 0.5; }
</style>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="main">
    <div class="page-header animate-in stagger-1">
      <div class="page-greeting">Messages</div>
      <div class="page-subtitle">Communicate with your care team</div>
    </div>
    <div class="messages-layout animate-in stagger-2" id="messagesLayout"></div>
  </main>
</div>
<div class="demo-toggle" id="demoToggle"></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
const seed = getCurrentSeed();
const state = getOrSeedState(seed);
renderSidebar("messages", state);
renderDemoToggle(seed);

let selectedThread = null;
let filter = "all";

function renderMessages() {
  const threads = state.messages || [];
  const filtered = filter === "unread" ? threads.filter(t => t.unread) : threads;
  const sorted = [...filtered].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  if (threads.length === 0) {
    document.getElementById("messagesLayout").innerHTML = `
      <div class="inbox-empty" style="grid-column:1/-1">
        <div class="inbox-empty-shapes">
          <div class="circle1"></div><div class="circle2"></div><div class="rect"></div>
        </div>
        <h3>No messages yet</h3>
        <p>Your care team will reach out here once your treatment begins</p>
      </div>`;
    return;
  }

  let html = `
    <div class="thread-list">
      <div class="thread-list-header"><h2>Inbox</h2></div>
      <div class="thread-filter">
        <button class="${filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
        <button class="${filter === 'unread' ? 'active' : ''}" onclick="setFilter('unread')">Unread</button>
      </div>
      <div class="thread-items">
        ${sorted.map(t => `
          <div class="thread-item ${selectedThread === t.id ? 'active' : ''}" onclick="selectThread('${t.id}')">
            <div class="thread-avatar ${t.role === 'Support' ? 'support' : ''}">${t.sender.split(' ').map(w => w[0]).filter((_, i) => i < 2).join('')}</div>
            <div class="thread-info">
              <div class="thread-top">
                <span class="thread-sender">${t.sender.split(',')[0]}</span>
                <span class="thread-time">${formatRelative(t.timestamp)}</span>
              </div>
              <div class="thread-role">${t.role}</div>
              <div class="thread-preview">
                <span class="thread-unread-indicator">
                  ${t.unread ? '<span class="unread-dot"></span>' : ''}
                  ${t.preview}
                </span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  if (selectedThread) {
    const thread = threads.find(t => t.id === selectedThread);
    if (thread) {
      html += `
        <div class="thread-view">
          <div class="thread-view-header">
            <div class="thread-avatar ${thread.role === 'Support' ? 'support' : ''}" style="width:36px;height:36px;font-size:13px;">${thread.sender.split(' ').map(w => w[0]).filter((_, i) => i < 2).join('')}</div>
            <div>
              <div class="name">${thread.sender}</div>
              <div class="role">${thread.role}</div>
            </div>
            <div class="response-time">
              ${icon('clock', 14)}
              Typical response: within 1 business day
            </div>
          </div>
          <div class="messages-body" id="messagesBody">
            ${thread.messages.map((m, i) => {
              const showDate = i === 0 || formatDate(m.time) !== formatDate(thread.messages[i-1].time);
              return `
                ${showDate ? `<div class="msg-date-divider">${formatDate(m.time)}</div>` : ''}
                <div class="msg-bubble-row ${m.from}">
                  <div class="msg-bubble-avatar">${m.from === 'provider' ? thread.sender.split(' ').map(w => w[0]).filter((_, i) => i < 2).join('') : state.user.firstName[0]}</div>
                  <div>
                    <div class="msg-bubble">${m.text}</div>
                    <div class="msg-bubble-time">${formatTime(m.time)}</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="message-input-area">
            <textarea class="message-textarea" id="msgInput" placeholder="Type a message..." rows="1" oninput="autoGrow(this); toggleSend()"></textarea>
            <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
              ${icon('send', 18)}
            </button>
          </div>
        </div>
      `;
    }
  } else {
    html += `
      <div class="thread-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICONS.messages}</svg>
        <p>Select a conversation</p>
      </div>
    `;
  }

  document.getElementById("messagesLayout").innerHTML = html;

  if (selectedThread) {
    const body = document.getElementById("messagesBody");
    if (body) body.scrollTop = body.scrollHeight;
  }
}

function selectThread(id) {
  selectedThread = id;
  // Mark as read
  const t = state.messages.find(t => t.id === id);
  if (t && t.unread) {
    t.unread = false;
    setState(state);
    renderSidebar("messages", state);
  }
  renderMessages();
}

function setFilter(f) {
  filter = f;
  renderMessages();
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleSend() {
  const btn = document.getElementById("sendBtn");
  const input = document.getElementById("msgInput");
  if (btn && input) btn.disabled = !input.value.trim();
}

function sendMessage() {
  const input = document.getElementById("msgInput");
  if (!input || !input.value.trim()) return;
  const thread = state.messages.find(t => t.id === selectedThread);
  if (!thread) return;
  thread.messages.push({
    from: "user",
    text: input.value.trim(),
    time: new Date().toISOString()
  });
  thread.timestamp = new Date().toISOString();
  thread.preview = input.value.trim().substring(0, 50) + (input.value.trim().length > 50 ? '...' : '');
  setState(state);
  renderMessages();
  showToast("Message sent");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function renderSidebar(activePage, state) {
  const unread = getUnreadCount(state);
  const links = [
    { id: 'dashboard', label: 'Dashboard', icon: 'dashboard', href: 'dashboard.html' },
    { id: 'messages', label: 'Messages', icon: 'messages', href: 'messages.html', badge: unread },
    { id: 'orders', label: 'Orders', icon: 'orders', href: 'orders.html' },
    { id: 'progress', label: 'Progress', icon: 'progress', href: 'progress.html' },
    { id: 'resources', label: 'Resources', icon: 'resources', href: 'resources.html' },
  ];
  document.getElementById('sidebar').innerHTML = `
    <a class="sidebar-logo" href="dashboard.html"><span class="logo-dot"></span>Nuvela</a>
    <div class="sidebar-nav">
      ${links.map(l => `
        <a class="sidebar-link ${activePage === l.id ? 'active' : ''}" href="${l.href}">
          <svg viewBox="0 0 24 24">${ICONS[l.icon]}</svg>${l.label}
          ${l.badge ? '<span class="sidebar-badge">' + l.badge + '</span>' : ''}
        </a>`).join('')}
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar">${state.user.firstName[0]}${state.user.lastName[0]}</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">${state.user.firstName} ${state.user.lastName}</div>
        <div class="sidebar-user-plan">${state.plan.name} Plan</div>
      </div>
    </div>`;
}

function renderDemoToggle(seed) {
  document.getElementById('demoToggle').innerHTML = `
    <button class="${seed === 'newUser' ? 'active' : ''}" onclick="switchSeed('newUser')">New User</button>
    <button class="${seed === 'week4' ? 'active' : ''}" onclick="switchSeed('week4')">Week 4</button>`;
}
function switchSeed(name) { setCurrentSeed(name); location.reload(); }

renderMessages();
// Auto-select first thread if week4
if (state.messages.length > 0 && !selectedThread) {
  const sorted = [...state.messages].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  selectThread(sorted[0].id);
}
</script>
</body>
</html>
